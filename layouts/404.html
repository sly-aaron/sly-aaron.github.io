{{ define "main" }}
  <section class="hero hero--section">
    <div class="hero__copy">
      <p class="eyebrow">404</p>
      <h1>页面不在这儿</h1>
      <p class="hero__lead">
        这个链接可能已经移动，或者原本就是个临时入口。回到首页继续找吧。
      </p>
      <div class="hero__actions">
        <a class="button button--primary" href="{{ "/" | relURL }}">回到首页</a>
        <a class="button button--ghost" href="{{ "/ctf/" | relURL }}">去 CTF</a>
      </div>
    </div>

    <aside class="hero__panel">
      <div class="metric">
        <span>建议</span>
        <strong>先从首页分区开始</strong>
      </div>
      <div class="metric">
        <span>状态</span>
        <strong>没有找到该页面</strong>
      </div>
    </aside>
  </section>
{{ end }}
